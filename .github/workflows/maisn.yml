name: Signed Commit

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    branches:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Configure Git
        run: |
          git config --global user.name "davooilgla"
          git config --global user.email "271512678+davooilgla@users.noreply.github.com"
      
      - name: Setup GPG with Passphrase Caching
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          
          # Import the key
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import --no-tty
          
          # Configure gpg-agent
          cat > ~/.gnupg/gpg-agent.conf <<EOF
          default-cache-ttl 7200
          max-cache-ttl 7200
          EOF
          
          gpgconf --kill all || true
          sleep 1
          gpg-agent --daemon
          
          # Get the keygrip and cache the passphrase
          KEYGRIP=$(gpg --with-keygrip --list-secret-keys "$GPG_KEY_ID" | grep Keygrip | awk '{print $3}')
          /usr/lib/gnupg/gpg-preset-passphrase --preset "$KEYGRIP" <<< "$GPG_PASSPHRASE"
      
      - name: Configure Git GPG Signing
        run: |
          git config --global user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config --global commit.gpgsign true
      
      - name: Make Signed Commit
        run: |
          echo "# Modified $(date)" >> example.py
          git add example.py
          git commit -m "Signed commit to .py file"
          git push
