name: Update yeay.py with signed commit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | sed 's/.*\///')
          echo "KEY_ID=$KEY_ID" >> $GITHUB_ENV
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Trust the key
        run: |
          echo -e "5\ny\n" | gpg --command-fd 0 --batch --yes --edit-key $KEY_ID trust
        env:
          KEY_ID: ${{ env.KEY_ID }}

      - name: Add comment to top of yeay.py
        run: |
          echo "# Auto-generated comment" | cat - yeay.py > temp && mv temp yeay.py

      - name: Configure Git for signing
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config commit.gpgsign true
          git config gpg.program gpg
          git config user.signingkey $KEY_ID
        env:
          KEY_ID: ${{ env.KEY_ID }}

      - name: Commit and push
        run: |
          git add yeay.py
          git commit -m "Add comment to yeay.py" || echo "No changes to commit"
          git push
        env:
          GPG_TTY: $(tty)
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
