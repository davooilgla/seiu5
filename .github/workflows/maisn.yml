name: Update yeay.py with signed commit

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    branches:

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1. Import your private GPG key
      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import

          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | sed 's/.*\///')
          echo "KEY_ID=$KEY_ID" >> $GITHUB_ENV
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # 2. Enable loopback pinentry
      - name: Enable loopback pinentry
        run: |
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      # 3. Create GPG wrapper to force loopback mode ALWAYS
      - name: Create GPG wrapper
        run: |
          cat << 'EOF' > ~/gpg-wrapper.sh
          #!/bin/sh
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" "$@"
          EOF
          chmod +x ~/gpg-wrapper.sh
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # 4. Trust the key
      - name: Trust the GPG key
        run: |
          echo -e "5\ny\n" | gpg --command-fd 0 --batch --yes --edit-key $KEY_ID trust
        env:
          KEY_ID: ${{ env.KEY_ID }}

      # 5. Modify the file
      - name: Add comment to top of yeay.py
        run: |
          echo "# Auto-generated comment" | cat - yeay.py > temp && mv temp yeay.py

      # 6. Configure Git to use wrapper for signing
      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "271512678+davooilgla@users.noreply.github.com"
          git config commit.gpgsign true
          git config gpg.program ~/gpg-wrapper.sh
          git config user.signingkey $KEY_ID
        env:
          KEY_ID: ${{ env.KEY_ID }}

      # 7. Commit and push (signed)
      - name: Commit and push
        run: |
          git add yeay.py
          git commit -S -m "Update yeay.py" || echo "No changes to commit"
          git push
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
