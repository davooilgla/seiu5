name: Signed Commit

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    branches:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Configure Git
        run: |
          git config --global user.name "davooilgla"
          git config --global user.email "271512678+davooilgla@users.noreply.github.com"
      
      - name: Setup GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import --no-tty
          
          # Configure gpg-agent for non-interactive use
          cat > ~/.gnupg/gpg-agent.conf <<EOF
          allow-loopback-pinentry
          default-cache-ttl 7200
          max-cache-ttl 7200
          EOF
          
          gpgconf --kill all || true
          sleep 1
          gpgconf --launch gpg-agent
      
      - name: Configure Git GPG Signing
        run: |
          git config --global user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg
      
      - name: Make Signed Commit
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "# Modified $(date)" >> example.py
          git add example.py
          git commit -m "Signed commit to .py file"
          git push
