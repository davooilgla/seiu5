name: Signed Commit

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    branches:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Configure Git
        run: |
          git config --global user.name "davooilgla"
          git config --global user.email "271512678+davooilgla@users.noreply.github.com"
      
      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
      
      - name: Configure GPG Agent
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          echo "pinentry-program /usr/bin/pinentry-curses" > ~/.gnupg/gpg-agent.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpg-agent --daemon --default-cache-ttl 7200 > /dev/null
      
      - name: Configure Git GPG
        run: |
          git config --global user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config --global commit.gpgsign true
      
      - name: Make Signed Commit
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "# Modified" >> example.py
          git add example.py
          git commit -m "Signed commit to .py file" --verbose
          git push
